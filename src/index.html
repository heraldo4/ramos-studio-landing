<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAMOS Studio CR</title>
  <link href="../dist/output.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-800 font-sans">

  <!-- Encabezado -->
  <div id="header"></div>

  <!-- Hero / Portada -->
  <section class="bg-gray-100 text-center py-20 px-4">
    <h2 class="text-4xl md:text-5xl font-bold mb-4">Metodología BIM para Paisajismo, Arquitectura y Electromecánica</h2>
    <p class="text-lg md:text-xl text-gray-700 mb-6">Soluciones digitales integradas para transformar tus proyectos</p>
    <a href="contacto.html" class="bg-green-900 text-white px-6 py-3 rounded hover:bg-green-800">Contáctanos</a>
  </section>

  <!-- Contacto -->


  <!-- Pie de página -->
  <div id="footer"></div>


  <link href="../dist/output.css" rel="stylesheet">



  <script>
    fetch("header.html?" + new Date().getTime())
        .then(res => res.text())
        .then(data => {
            document.getElementById("header").innerHTML = data;
        });

    fetch("footer.html").then(res => res.text()).then(data => {
      document.getElementById("footer").innerHTML = data;
    });
  </script>
  
</body>
</html>
