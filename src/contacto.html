<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicios | RAMOS Studio CR</title>
  <link href="../dist/output.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-800 font-sans">

<div id="header"></div>

<section id="contacto" class="py-16 px-6 bg-gray-50">
    <div class="container mx-auto text-center max-w-xl">
      <h3 class="text-3xl font-bold mb-6">Contacto</h3>
      <form action="https://formspree.io/f/mnndvbgo" method="POST" class="space-y-4">
        <input type="text" name="nombre" placeholder="Nombre" required class="w-full p-3 border rounded">
        <input type="email" name="email" placeholder="Correo electrónico" required class="w-full p-3 border rounded">
        <textarea name="mensaje" placeholder="Mensaje" required class="w-full p-3 border rounded"></textarea>
        <button type="submit" class="bg-green-900 text-white px-6 py-3 rounded hover:bg-green-800">Enviar</button>
      </form>
      <p id="form-success" class="hidden text-green-700 font-semibold mt-4">¡Gracias por contactarnos! Te responderemos pronto.</p>      
    </div>
  </section>

<div id="footer"></div>

<script>
    const form = document.querySelector("form");
    const successMessage = document.getElementById("form-success");
  
    form.addEventListener("submit", async function (e) {
      e.preventDefault(); // Evita que el formulario recargue la página
  
      const data = new FormData(form);
      const action = form.action;
  
      try {
        const response = await fetch(action, {
          method: "POST",
          body: data,
          headers: {
            'Accept': 'application/json'
          }
        });
  
        if (response.ok) {
          form.reset(); // Limpia los campos
          successMessage.classList.remove("hidden");
        } else {
          alert("Hubo un error. Intenta más tarde.");
        }
      } catch (error) {
        alert("Error de conexión. Intenta más tarde.");
      }
    });
  </script>

<script>
    fetch("header.html?" + new Date().getTime())
        .then(res => res.text())
        .then(data => {
            document.getElementById("header").innerHTML = data;
        });

    fetch("footer.html").then(res => res.text()).then(data => {
      document.getElementById("footer").innerHTML = data;
    });
  </script>
