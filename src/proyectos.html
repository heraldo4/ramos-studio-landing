<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyectos | RAMOS Studio CR</title>
  <link href="../dist/output.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-800 font-sans">

  <div id="header"></div>

  <main class="py-16 px-6 bg-white">
    <div class="container mx-auto text-center">
      <h2 class="text-4xl font-bold mb-10">Nuestros Proyectos</h2>
      <div class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="border rounded shadow p-4 hover:shadow-lg transition">
          <img src="img/proyecto1.png" alt="Proyecto 1" class="w-full h-48 object-cover rounded mb-4">
          <h3 class="text-xl font-semibold mb-2">Proyecto Residencial Verde</h3>
          <p>Integración de paisajismo y arquitectura en zona urbana.</p>
        </div>
        <div class="border rounded shadow p-4 hover:shadow-lg transition">
          <img src="img/proyecto2.png" alt="Proyecto 2" class="w-full h-48 object-cover rounded mb-4">
          <h3 class="text-xl font-semibold mb-2">Infraestructura Electromecánica</h3>
          <p>Diseño BIM de redes eléctricas y HVAC para industria.</p>
        </div>
        <div class="border rounded shadow p-4 hover:shadow-lg transition">
          <img src="img/proyecto3.jpg" alt="Proyecto 3" class="w-full h-48 object-cover rounded mb-4">
          <h3 class="text-xl font-semibold mb-2">Parque Urbano Inteligente</h3>
          <p>Proyecto de espacio público con tecnología y sostenibilidad.</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    fetch("header.html?" + new Date().getTime())
        .then(res => res.text())
        .then(data => {
            document.getElementById("header").innerHTML = data;
        });


    fetch("footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

</body>
</html>
