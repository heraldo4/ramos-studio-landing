<!-- header.html -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="icon" href="logoRound.png" type="image/png">

<header id="site-header">
  <div style="max-width:1280px; margin:0 auto; padding:0 32px;">
    <div style="display:flex; align-items:center; justify-content:space-between;">

      <!-- Logo + Brand -->
      <a href="index.html" style="display:flex; align-items:center; gap:14px; text-decoration:none;">
        <img src="logoRound.png" alt="RAMOS Studio CR" class="logo">
        <div>
          <div style="font-size:1.05rem; font-weight:700; color:#111; letter-spacing:0.04em; line-height:1.2;">RAMOS Studio CR</div>
          <div style="font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); font-weight:500;">Arquitectura & BIM</div>
        </div>
      </a>

      <!-- Desktop nav -->
      <nav class="desktop-nav" style="display:flex; align-items:center; gap:36px;">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="servicios.html" class="nav-link">Servicios</a>
        <a href="proyectos.html" class="nav-link">Proyectos</a>
        <a href="contacto.html" class="btn-gold" style="padding:10px 24px; font-size:0.82rem;">Contáctenos</a>
      </nav>

      <!-- Hamburger (mobile) -->
      <button class="hamburger" id="hamburger-btn" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Inicio</a>
    <a href="servicios.html">Servicios</a>
    <a href="proyectos.html">Proyectos</a>
    <a href="contacto.html" style="color:var(--gold);">Contáctenos</a>
  </div>
</header>

<script>
(function() {
  // Scroll effect
  const header = document.getElementById('site-header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 40);
  });

  // Hamburger toggle
  const btn = document.getElementById('hamburger-btn');
  const menu = document.getElementById('mobile-menu');
  btn.addEventListener('click', () => {
    btn.classList.toggle('open');
    menu.classList.toggle('open');
  });

  // Active nav link
  const links = document.querySelectorAll('.nav-link, .mobile-menu a');
  const current = location.pathname.split('/').pop() || 'index.html';
  links.forEach(link => {
    const href = link.getAttribute('href');
    if (href === current || (current === '' && href === 'index.html')) {
      link.classList.add('active');
    }
  });
})();
</script>
